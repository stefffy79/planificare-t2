<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <title>Redirecționare...</title>
</head>
<body>
  <script>
    // GitHub Pages serveste 404.html pentru orice path negasit.
    // Supabase trimite tokenul ca hash la root-ul domeniului (stefffy79.github.io/#access_token=...)
    // Aceasta pagina preia hash-ul si redirecteaza spre aplicatie cu tot cu token.
    var hash = window.location.hash; // ex: #access_token=eyJ...
    if (hash) {
      window.location.replace("https://stefffy79.github.io/planificare-t2/" + hash);
    } else {
      window.location.replace("https://stefffy79.github.io/planificare-t2/");
    }
  </script>
  <p>Se redirecționează...</p>
</body>
</html>
